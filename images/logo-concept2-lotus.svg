<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <linearGradient id="roseGold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B5C72"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
    <linearGradient id="petalL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B5C72" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity=".4"/>
    </linearGradient>
    <linearGradient id="petalR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#9B5C72" stop-opacity=".4"/>
    </linearGradient>
    <linearGradient id="petalC" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#9B5C72"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>

  <g transform="translate(200,160)">
    <!-- Centre petal (tallest) -->
    <path d="M 0,-110 Q 22,-60, 22,-10 Q 22,25, 0,35 Q -22,25, -22,-10 Q -22,-60, 0,-110 Z"
          fill="url(#petalC)" opacity=".9"/>

    <!-- Inner left petal -->
    <path d="M -15,-95 Q -55,-50, -50,0 Q -48,30, -18,35 Q 0,28, 5,5 Q 8,-40, -15,-95 Z"
          fill="url(#petalL)" opacity=".7" transform="rotate(-22,0,0)"/>

    <!-- Inner right petal -->
    <path d="M 15,-95 Q 55,-50, 50,0 Q 48,30, 18,35 Q 0,28, -5,5 Q -8,-40, 15,-95 Z"
          fill="url(#petalR)" opacity=".7" transform="rotate(22,0,0)"/>

    <!-- Outer left petal -->
    <path d="M -20,-80 Q -72,-35, -65,15 Q -60,42, -30,42 Q -10,38, -2,15 Q 5,-30, -20,-80 Z"
          fill="url(#petalL)" opacity=".45" transform="rotate(-42,0,0)"/>

    <!-- Outer right petal -->
    <path d="M 20,-80 Q 72,-35, 65,15 Q 60,42, 30,42 Q 10,38, 2,15 Q -5,-30, 20,-80 Z"
          fill="url(#petalR)" opacity=".45" transform="rotate(42,0,0)"/>

    <!-- Far outer left petal (subtle) -->
    <path d="M -18,-65 Q -75,-22, -68,22 Q -62,45, -35,42 Q -15,38, -5,18 Q 4,-20, -18,-65 Z"
          fill="#9B5C72" opacity=".2" transform="rotate(-62,0,0)"/>

    <!-- Far outer right petal (subtle) -->
    <path d="M 18,-65 Q 75,-22, 68,22 Q 62,45, 35,42 Q 15,38, 5,18 Q -4,-20, 18,-65 Z"
          fill="#C9A96E" opacity=".2" transform="rotate(62,0,0)"/>

    <!-- Centre dot -->
    <circle cx="0" cy="10" r="6" fill="#C9A96E" opacity=".6"/>
    <circle cx="0" cy="10" r="3" fill="#9B5C72" opacity=".7"/>
  </g>

  <!-- Studio name -->
  <text x="200" y="345" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
        font-size="28" font-weight="400" letter-spacing="6" fill="#9B5C72">BEAUTY EXPERT</text>
  <text x="200" y="380" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
        font-size="20" font-weight="400" letter-spacing="10" fill="#C9A96E">STUDIO</text>

  <!-- Thin decorative line -->
  <line x1="140" y1="318" x2="260" y2="318" stroke="url(#roseGold2)" stroke-width="1" opacity=".5"/>

  <!-- Tagline -->
  <text x="200" y="418" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="11" font-weight="300" letter-spacing="3" fill="#9B5C72" opacity=".6">GLEN INNES · AUCKLAND</text>
</svg>
